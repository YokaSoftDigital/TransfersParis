services:
  db:
    image: mariadb:10.5
    container_name: transfersparis-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tranpari_transfer
      MYSQL_USER: tranpari_transfer
      MYSQL_PASSWORD: wp_local_pass
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./Beckup:/backups:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30

  wordpress:
    image: wordpress:5.4.2-php7.4-apache
    container_name: transfersparis-wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: tranpari_transfer
      WORDPRESS_DB_USER: tranpari_transfer
      WORDPRESS_DB_PASSWORD: wp_local_pass
    volumes:
      - ./Beckup/transfers-paris.com/www:/var/www/html

volumes:
  db_data:
